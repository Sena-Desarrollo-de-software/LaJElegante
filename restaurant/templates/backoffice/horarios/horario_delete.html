{% extends "backoffice/layouts/base_form.html" %}

{% block title %}Eliminar horario{% endblock %}

{% block content %}
<div class="container">
  <h1 class="mb-4 text-danger">Eliminar horario</h1>

  <div class="card border-danger shadow-sm">
    <div class="card-body">
      <p>Estás a punto de desactivar este horario:</p>
      <p><strong>{{ horario }}</strong></p>

      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger">
            Confirmar eliminación
          </button>
          <a href="{% url 'restaurant:horario_index' %}" class="btn btn-secondary">
            Cancelar
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
