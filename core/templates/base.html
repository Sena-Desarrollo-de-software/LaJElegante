<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{% block title %}Hotel LJE{% endblock %}</title>

  {% load static %}

  <!-- Bootstrap CSS -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <!-- CSS global del proyecto -->
  <link rel="stylesheet" href="{% static 'css/global.css' %}">

  {# Bloque para CSS específicos por vista #}
  {% block styles %}{% endblock %}
</head>
<body>

  {% include "hotel/components/header.html" %}

  {% block content %}{% endblock %}

  <!-- Bootstrap JS (opcional pero recomendado) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  {# Bloque para scripts opcionales #}
  {% block scripts %}{% endblock %}
</body>
</html>
