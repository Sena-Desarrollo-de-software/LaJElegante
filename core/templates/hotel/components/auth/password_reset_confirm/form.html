<div class="card shadow-sm border-0">
  <div class="card-body p-4">

    <form method="post" novalidate>
      {% csrf_token %}

      {% if form.non_field_errors %}
        <div class="alert alert-danger">
          {% for error in form.non_field_errors %}
            <div>{{ error }}</div>
          {% endfor %}
        </div>
      {% endif %}

      <div class="mb-3">
        <label for="new_password1" class="form-label fw-semibold">Nueva contraseña</label>
        <input type="password" id="new_password1" name="new_password1"
               class="form-control {% if form.new_password1.errors %}is-invalid{% endif %}"
               required autocomplete="new-password">

        {% for error in form.new_password1.errors %}
          <div class="invalid-feedback d-block">
            {{ error }}
          </div>
        {% endfor %}
      </div>

      <div class="mb-3">
        <label for="new_password2" class="form-label fw-semibold">Confirmar contraseña</label>
        <input type="password" id="new_password2" name="new_password2"
               class="form-control {% if form.new_password2.errors %}is-invalid{% endif %}"
               required autocomplete="new-password">

        {% for error in form.new_password2.errors %}
          <div class="invalid-feedback d-block">
            {{ error }}
          </div>
        {% endfor %}
      </div>

      <button type="submit" class="btn btn-primary w-100">
        Guardar nueva contraseña
      </button>

    </form>

  </div>
</div>
